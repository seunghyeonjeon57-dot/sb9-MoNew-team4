name: MoNew Real CI/CD

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # 1. Java 소스 빌드 (Jar 생성)
      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew build -x test

      # 2. Docker 이미지 빌드
      - name: Build Docker Image
        run: |
          docker build -t geoni98/monew-app:latest .

      # 3. Docker Hub 로그인
      - name: Login to Docker Hub
        if: github.event_name != 'pull_request' && success()
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 4. Docker 이미지 푸시
      - name: Push Docker Image
        if: github.event_name != 'pull_request' && success()
        run: |
          docker push geoni98/monew-app:latest

      # [실패 알림] 빌드 또는 이미지 생성/푸시 실패 시
      - name: Notify Build/Push Failure
        if: failure()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          status: failure
          title: "❌ 빌드/푸시 실패: ${{ github.ref_name }}"
          description: "소스 빌드 또는 Docker 과정에서 에러가 발생했습니다. 로그를 확인하세요."
          color: 0xff0000

  deploy:
    needs: build-and-push
    # [중요] 오직 main 브랜치에 직접 Push/Merge 되었을 때만 서버 배포 실행
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/app
            docker-compose pull
            docker-compose up -d
            docker image prune -f

      - name: Notify Deploy Success
        if: success()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          status: success
          title: "✅ 운영 배포 성공 (Main)"
          description: "서버에 최신 기능이 성공적으로 반영되었습니다."
          color: 0x00ff00

      - name: Notify Deploy Failure
        if: failure()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          status: failure
          title: "🆘 운영 배포 실패 (Main)"
          description: "SSH 접속 또는 컨테이너 실행 중 문제가 발생했습니다."
          color: 0xff0000