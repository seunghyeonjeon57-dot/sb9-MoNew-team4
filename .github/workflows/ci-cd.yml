name: MoNew Real ECS CI/CD

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # 1. 로봇이 소스 빌드
      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew build -x test

      # 2. AWS 인증
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ap-northeast-2

      # 3. AWS ECR 로그인
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 4. Docker 이미지 빌드 및 ECR 푸시 (monew-app)
      - name: Build and Push Image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: monew-app
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      # [알림] 빌드/푸시 성공 (복구 완료)
      - name: Notify Build/Push Success
        if: always() && !failure() && !cancelled()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          status: success
          title: "🚀 CI 빌드 성공: ${{ github.ref_name }}"
          description: "소스 빌드 및 ECR 이미지 푸시가 완료되었습니다."
          color: 0x00ff00

      # [알림] 빌드/푸시 실패 (복구 완료)
      - name: Notify Build/Push Failure
        if: failure()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          status: failure
          title: "❌ 빌드/푸시 실패: ${{ github.ref_name }}"
          description: "로봇이 빌드 중 에러가 났습니다. 로그 확인하세요."
          color: 0xff0000

  deploy:
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ap-northeast-2

      # 5. ECS 서비스 업데이트 (monew-cluster, monew-task-service)
      - name: Update ECS Service
        run: |
          aws ecs update-service \
            --cluster monew-cluster \
            --service monew-task-service \
            --force-new-deployment

      # [알림] 운영 배포 성공 (복구 완료)
      - name: Notify Deploy Success
        if: success()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          status: success
          title: "✅ ECS 운영 배포 성공 (Main)"
          description: "서버에 최신 설정(S3 .env)이 정상 반영되었습니다."
          color: 0x00ff00

      # [알림] 운영 배포 실패 (복구 완료)
      - name: Notify Deploy Failure
        if: failure()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          status: failure
          title: "🆘 운영 배포 실패 (Main)"
          description: "ECS 업데이트 명령 중 문제가 발생했습니다."
          color: 0xff0000