name: SonarCloud Analysis

on:
  push:
    branches: [ "main", "develop" ] # 메인 브랜치에 코드 들어올 때
  pull_request:
    types: [opened, synchronize, reopened] # PR 올라올 때
  workflow_dispatch: # 팀장님이 수동으로 실행하고 싶을 때용 버튼

jobs:
  build:
    name: Build and analyze
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # SonarCloud 분석을 위해 전체 히스토리가 필요합니다.

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build and analyze with SonarCloud
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # 이건 깃허브가 자동으로 주는 겁니다.
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}    # 팀장님이 등록하신 그 토큰 이름!
        run: ./gradlew build sonar --info