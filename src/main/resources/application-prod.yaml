spring:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  datasource:
    url: jdbc:postgresql://${SPRING_DATASOURCE_URL}:${SPRING_DATASOURCE_PORT:5432}/monew
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI}

cloud:
  aws:
    s3:
      bucket: ${AWS_S3_BUCKET_NAME}
      credentials:
        access-key: ${AWS_S3_ACCESS_KEY}
        secret-key: ${AWS_S3_SECRET_KEY}
      region:
        static: ${AWS_S3_REGION}
      stack:
        auto: false
    log:
      s3:
        bucket: ${AWS_LOG_BUCKET_NAME}
      credentials:
        access-key: ${AWS_LOG_ACCESS_KEY}
        secret-key: ${AWS_LOG_SECRET_KEY}
      region:
        static: ${AWS_LOG_REGION}

news:
  api:
    naver:
      client-id: ${NAVER_CLIENT_ID}
      client-secret: ${NAVER_CLIENT_SECRET}
