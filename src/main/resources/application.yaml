spring:
  profiles:
    active: dev

  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true

  batch:
    jdbc:
      initialize-schema: always

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - [%X{request_id}] [%X{client_ip}] %msg%n"

news:
  rss:
    sources:
      - name: "한국경제"
        url: "https://www.hankyung.com/feed/all-news"
      - name: "조선일보"
        url: "https://www.chosun.com/arc/outboundfeeds/rss/category/all-posts/"
      - name: "연합뉴스"
        url: "https://www.yonhapnewstv.co.kr/browse/feed/"