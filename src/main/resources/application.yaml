spring:
  profiles:
    active: dev # 기본 실행 환경을 dev로 지정

  datasource:
    driver-class-name: org.postgresql.Driver # 모든 환경 공통 드라이버
  flyway:
    enabled: true
    baseline-on-migrate: true # 기존 DB가 있을 경우를 대비해 기준점을 잡음
    locations: classpath:db/migration

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: true # 쿼리 확인을 위해 공통 적용 (운영 시 prod에서 끌 수 있음)
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
  sql:
    init:
      mode: never

  batch:
    jdbc:
      initialize-schema: never
    job:
      enabled: false

  data:
    mongodb:
      uri: ${MONGO_ENDPOINT:mongodb://localhost:27017/monew_db}

management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
          - prometheus
  endpoint:
    health:
      show-details: when-authorized
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: monew

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - [%X{request_id}] [%X{client_ip}] %msg%n"

# 뉴스 소스는 모든 환경 공통이므로 여기에 둡니다.
news:
    api:
      naver:
        client-id: ${NAVER_CLIENT_ID}
        client-secret: ${NAVER_CLIENT_SECRET}
        url: "https://openapi.naver.com/v1/search/news.json"
    rss:
      hankyung: ${RSS_URL_HANKYUNG:https://www.hankyung.com/feed/all-news}
      chosun: ${RSS_URL_CHOSUN:https://www.chosun.com/arc/outboundfeeds/rss/?outputType=xml}
      yonhap: ${RSS_URL_YONHAP:https://www.yna.co.kr/rss/news.xml}