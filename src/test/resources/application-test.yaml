spring:
  datasource:
    # 에러 유발 옵션 제거 및 예약어(COMMENT, LIKE) 충돌 방지 옵션 추가
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DATABASE_TO_UPPER=FALSE;NON_KEYWORDS=COMMENT,LIKE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false

  sql:
    init:
      mode: never

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        # H2 대소문자 문제 방지를 위해 false 유지
        globally_quoted_identifiers: false
        dialect: org.hibernate.dialect.H2Dialect
        physical_strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

  data:
    mongodb:
      uri: mongodb://localhost:27017/test_db

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
          - prometheus
  prometheus:
    metrics:
      export:
        enabled: true

cloud:
  aws:
    credentials:
      access-key: test-access-key
      secret-key: test-secret-key
    region:
      static: us-east-1
    s3:
      bucket: test-bucket
    log:
      credentials:
        access-key: ${AWS_LOG_ACCESS_KEY}
        secret-key: ${AWS_LOG_SECRET_KEY}
      region:
        static: ${AWS_LOG_REGION}
      bucket: ${AWS_LOG_BUCKET_NAME}

naver:
  client-id: dummy-id
  client-secret: dummy-secret

news:
  rss:
    hankyung: http://test-url.com
    chosun: http://test-url.com
    yonhap: http://test-url.com

logging:
  level:
    org.springframework.batch: DEBUG
    org.hibernate.SQL: DEBUG