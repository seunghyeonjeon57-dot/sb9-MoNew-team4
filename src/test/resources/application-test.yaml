spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DATABASE_TO_UPPER=FALSE;NON_KEYWORDS=COMMENT,LIKE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false

  # 💡 하나로 합쳐진 autoconfigure 섹션
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
      - io.awspring.cloud.autoconfigure.s3.S3AutoConfiguration

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        globally_quoted_identifiers: false
        dialect: org.hibernate.dialect.H2Dialect
        physical_strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

  data:
    mongodb:
      uri: mongodb://localhost:27017/test_db

management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
          - prometheus
  prometheus:
    metrics:
      export:
        enabled: true

cloud:
  aws:
    credentials:
      access-key: test-access-key
      secret-key: test-secret-key
    region:
      static: ap-northeast-2
    s3:
      bucket: test-bucket
    log:
      credentials:
        access-key: test-log-key
        secret-key: test-log-secret
      region:
        static: ap-northeast-2
      bucket: test-log-bucket

naver:
  client-id: dummy-id
  client-secret: dummy-secret

news:
  rss:
    hankyung: http://test-url.com
    chosun: http://test-url.com
    yonhap: http://test-url.com

logging:
  level:
    org.springframework.batch: DEBUG
    org.hibernate.SQL: DEBUG