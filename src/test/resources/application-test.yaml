spring:
  datasource:
    # 1. 불필요한 옵션 제거 및 PostgreSQL 모드 최적화
    # DATABASE_TO_UPPER=FALSE로 대소문자 문제 방어
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DATABASE_TO_UPPER=FALSE;NON_KEYWORDS=COMMENT
    driver-class-name: org.h2.Driver
    username: sa
    password:

  batch:
    jdbc:
      # 2. 테스트마다 배치 테이블은 무조건 생성 (일반적이고 권장되는 설정)
      initialize-schema: always
    job:
      enabled: false

  sql:
    init:
      # 3. schema.sql의 PostgreSQL 전용 문법 에러 회피
      mode: never

  jpa:
    hibernate:
      # 4. 테스트 시작 시 엔티티를 기반으로 테이블 생성
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        # 5. [중요] 예약어 충돌 및 대소문자 구분을 위해 따옴표 사용 강제
        globally_quoted_identifiers: true
        dialect: org.hibernate.dialect.H2Dialect

  data:
    mongodb:
      uri: mongodb://localhost:27017/test_db

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

cloud:
  aws:
    credentials:
      access-key: test-access-key
      secret-key: test-secret-key
    region:
      static: us-east-1
    s3:
      bucket: test-bucket

naver:
  client-id: dummy-id
  client-secret: dummy-secret

news:
  rss:
    hankyung: http://test-url.com
    chosun: http://test-url.com
    yonhap: http://test-url.com

logging:
  level:
    org.springframework.batch: DEBUG
    org.hibernate.SQL: DEBUG