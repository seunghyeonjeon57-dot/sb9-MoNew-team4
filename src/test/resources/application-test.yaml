spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
  data:
    mongodb:
      uri: mongodb://localhost:27017/test_db
  sql:
    init:
      mode: never

  # [핵심 추가] 테스트 환경에서 시큐리티 자동 설정을 제외하여 401 에러를 원천 차단합니다.
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

cloud:
  aws:
    credentials:
      access-key: test-access-key
      secret-key: test-secret-key
    region:
      static: us-east-1
    s3:
      bucket: test-bucket

# [추가] NewsCollector가 사용하는 API 키 가짜 설정
naver:
  client-id: dummy-id
  client-secret: dummy-secret

# [추가] NewsBatchScheduler가 사용하는 RSS URL 가짜 설정
news:
  rss:
    hankyung: http://test-url.com
    chosun: http://test-url.com
    yonhap: http://test-url.com

