spring:
  datasource:
    # PostgreSQL 호환 모드 및 예약어 충돌 방지 설정 유지
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DATABASE_TO_UPPER=FALSE;NON_KEYWORDS=COMMENT,LIKE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  batch:
    jdbc:
      # S3 간섭을 차단했으므로, 이제 안정적으로 테이블을 생성하도록 always 설정
      initialize-schema: always
    job:
      # 테스트 구동 시 모든 배치가 자동 실행되는 것을 방지
      enabled: false


  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
      # S3ProtocolResolver가 리소스 경로 해석을 방해하지 못하도록 S3 자동 설정 제외
      - io.awspring.cloud.autoconfigure.s3.S3AutoConfiguration

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        globally_quoted_identifiers: false
        dialect: org.hibernate.dialect.H2Dialect
        physical_strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

  data:
    mongodb:
      # 로컬/CI 환경에서 테스트용 임시 DB 사용
      uri: mongodb://localhost:27017/test_db

cloud:
  aws:
    credentials:
      access-key: test-access-key
      secret-key: test-secret-key
    region:
      static: ap-northeast-2
    s3:
      bucket: test-bucket
    # 로그용 S3 설정도 가짜 값으로 채워 빈 생성 에러 방지
    log:
      credentials:
        access-key: test-log-key
        secret-key: test-log-secret
      region:
        static: ap-northeast-2
      bucket: test-log-bucket

naver:
  client-id: dummy-id
  client-secret: dummy-secret

news:
  rss:
    hankyung: http://test-url.com
    chosun: http://test-url.com
    yonhap: http://test-url.com

logging:
  level:
    org.springframework.batch: DEBUG
    org.hibernate.SQL: DEBUG